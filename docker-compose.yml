services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: teeming_db
      POSTGRES_USER: teeming_user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6380:6379"

  backend:
    build: ./backend
    volumes:
      - ./backend:/app          # live-reload: local code changes reflect instantly
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    develop:
      watch:
        - action: sync+restart
          path: ./backend
          target: /app
          ignore:
            - "**/__pycache__/"
            - "**/*.pyc"
        - action: rebuild
          path: ./requirements.txt

  celery_worker:
    build: ./backend
    entrypoint: []
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules        # prevents host node_modules from overwriting container's
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata: