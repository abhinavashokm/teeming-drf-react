# docker-compose.prod.yml
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: teeming_db
      POSTGRES_USER: teeming_user
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    # No ports exposed to host — only backend needs to reach it, via internal Docker network

  redis:
    image: redis:7
    restart: unless-stopped
    # No ports exposed to host — internal only

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    restart: unless-stopped
    # No ports exposed to host — nginx proxies to it internally on the Docker network

  celery_worker:
    build: ./backend
    entrypoint: []
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
      - backend

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata: