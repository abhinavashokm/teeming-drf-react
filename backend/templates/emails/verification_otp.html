<div style="
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        padding: 40px 20px;
    ">
    <div style="
            max-width: 500px;
            margin: auto;
            background-color: white;
            padding: 40px;
            border-radius: 12px;
        ">
        <h2 style="
                margin-bottom: 20px;
                color: #111827;
            ">
            Verify Your Email
        </h2>

        <p style="
                color: #4b5563;
                font-size: 15px;
                line-height: 1.6;
            ">
            Thank you for signing up for <strong>Teeming</strong>.
            Please use the verification code below to complete your account setup.
        </p>

        <div style="
                margin: 30px 0;
                text-align: center;
            ">
            <span style="
                    display: inline-block;
                    background-color: #ecfdf5;
                    color: #047857;
                    font-size: 32px;
                    letter-spacing: 8px;
                    font-weight: bold;
                    padding: 16px 28px;
                    border-radius: 10px;
                ">
                {{otp}}
            </span>
        </div>

        <p style="
                color: #6b7280;
                font-size: 14px;
                line-height: 1.6;
            ">
            This OTP is valid for <strong>{{ otp_expiry }}</strong>.
        </p>

        <p style="
                color: #6b7280;
                font-size: 14px;
                line-height: 1.6;
            ">
            If you did not request this email, you can safely ignore it.
        </p>

        <hr style="
                border: none;
                border-top: 1px solid #e5e7eb;
                margin: 30px 0;
            ">

        <p style="
                color: #9ca3af;
                font-size: 12px;
                text-align: center;
            ">
            © 2026 Teeming. All rights reserved.
        </p>
    </div>
</div>
